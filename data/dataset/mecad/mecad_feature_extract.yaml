# MECAD feature extraction config
# One-line model switch:
#   video.model_name: densenet121  -> densenet169 / densenet201

dataset:
  # M3HG-format MECAD labels directory:
  #   train_data_pair.json / valid_data_pair.json / test_data_pair.json
  annotation_dir: "."

  # Root directory containing mp4 files.
  # Supported layouts:
  # 1) <video_root>/<video_name>.mp4
  # 2) <video_root>/<split>/<video_name>.mp4
  video_root_dir: "videos"

  splits: ["train", "valid", "test"]
  video_extensions: [".mp4"]
  recursive_video_search: true

audio:
  # Keep true to preserve current resume state.
  # If you want phase-wise extraction, you can set this to false manually.
  enabled: true
  # Use a local directory path if this model id is unavailable online.
  model_name_or_path: "wbbbbb/wav2vec2-large-chinese-zh-cn"
  sample_rate: 16000
  # mean | min_mean_max
  pooling: "min_mean_max"

video:
  enabled: true
  # Change this single line to switch variant:
  model_name: "densenet201"   #121/169/201
  pretrained_imagenet: true
  # Optional local checkpoint path for torchvision DenseNet state_dict.
  checkpoint_path: null
  num_frames: 16
  resize_shorter_side: 256
  crop_size: 224
  # mean | min_mean_max
  pooling: "min_mean_max"

runtime:
  device: "cuda"
  seed: 42
  # Resume extraction from existing checkpoint state.
  resume: true
  # Flush progress every N utterances (larger => less I/O overhead).
  save_every: 64
  # Global utterance batch size (used when modality-specific size is not set).
  batch_size: 24
  # Modality-specific batch sizes.
  # Audio tends to be padding-heavy; keep it small when audio is enabled.
  audio_batch_size: 1
  # 8GB GPU aggressive setting for DenseNet201 + 16 frames.
  # If OOM, reduce in this order: 24 -> 20 -> 16 -> 12.
  video_batch_size: 24
  # Run audio/video extraction blocks concurrently within each batch.
  # On single GPU this may or may not speed up; benchmark on your machine.
  parallel_modalities: true
  # In speed tuning stage, fail fast is safer than silently writing zero vectors.
  skip_on_error: false
  # Extraction scope:
  # - demo: randomly sample demo_num_videos from video_root_dir
  # - all: use all videos under video_root_dir (recursive)
  scope: "all"
  demo_num_videos: 10
  # Set to an integer for smoke tests, null for full extraction.
  max_utterances: null

output:
  output_dir: "."
  # If true, save as audio_embedding_<dim>.npy / video_embedding_<dim>.npy
  embed_dim_in_filename: true
  audio_file: "audio_embedding.npy"
  video_file: "video_embedding.npy"
  mapping_file: "video_id_mapping.npy"
  manifest_file: "utterance_manifest.jsonl"
  meta_file: "feature_meta.json"
  done_file: "extract_done_mask.npy"
  state_file: "extract_state.json"
